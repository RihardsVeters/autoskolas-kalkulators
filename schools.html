<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoskolu Cenas | Autoskolas Kalkulators</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-D33V6JW5DG"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-D33V6JW5DG');</script>
<style>
  :root {
    --bg: #F5F0E8;
    --card: #FFFFFF;
    --accent: #1B4D3E;
    --accent-light: #2A7A5E;
    --highlight: #E8A838;
    --highlight-light: #FFF3DC;
    --text: #1A1A1A;
    --text-sec: #5A5A5A;
    --border: #D4CFC5;
    --r: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 0 0 80px;
  }
  .hero {
    background: var(--accent); color: white; text-align: center;
    padding: 32px 16px 28px;
  }
  .hero h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
  .hero p { font-size: 0.85rem; opacity: 0.8; }
  .container { max-width: 820px; margin: 0 auto; padding: 20px 16px; }
  .cat-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .cat-tab {
    padding: 10px 20px; border: 2px solid var(--border); background: var(--card);
    border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
    transition: all 0.2s; font-family: inherit;
  }
  .cat-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .cat-tab:hover:not(.active) { border-color: var(--accent-light); }
  .updated { text-align: center; font-size: 0.75rem; color: var(--text-sec); margin-bottom: 16px; }
  .school-card {
    background: var(--card); border-radius: var(--r); padding: 20px;
    margin-bottom: 14px; box-shadow: 0 2px 12px rgba(27,77,62,0.07);
    border: 1px solid rgba(0,0,0,0.04);
  }
  .school-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .school-logo {
    width: 44px; height: 44px; border-radius: 10px; display: flex;
    align-items: center; justify-content: center; font-weight: 900;
    font-size: 0.65rem; color: white; flex-shrink: 0;
  }
  .school-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }
  .school-name { font-size: 1rem; font-weight: 700; color: var(--accent); }
  .school-link { font-size: 0.75rem; color: var(--accent-light); text-decoration: none; }
  .school-link:hover { text-decoration: underline; }
  .price-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px; margin-bottom: 12px;
  }
  .price-item {
    background: #F8F6F1; border-radius: 8px; padding: 10px 12px; text-align: center;
  }
  .price-label { font-size: 0.7rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
  .price-value { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
  .price-value.na { font-size: 0.8rem; font-weight: 600; color: var(--text-sec); }
  .school-note {
    font-size: 0.78rem; color: var(--text-sec); line-height: 1.45;
    padding: 8px 12px; background: var(--highlight-light); border-radius: 8px;
    border-left: 3px solid var(--highlight);
  }
  .loading { text-align: center; padding: 40px; color: var(--text-sec); font-size: 0.9rem; }
  .back-link {
    display: block; text-align: center; margin-top: 24px;
    color: var(--accent-light); text-decoration: none; font-size: 0.85rem;
  }
  .back-link:hover { text-decoration: underline; }
  .empty-msg {
    text-align: center; padding: 30px; color: var(--text-sec);
    font-size: 0.88rem; font-style: italic;
  }
</style>
</head>
<body>

<div class="hero">
  <h1>&#x1F3EB; Autoskolu Cenas</h1>
  <p>Sal&#x012B;dzini cenas no popul&#x0101;r&#x0101;kaj&#x0101;m autoskol&#x0101;m Latvij&#x0101;</p>
</div>

<div class="container">
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab active" onclick="showCat('A',this)">&#x1F3CD;&#xFE0F; A kategorija</button>
    <button class="cat-tab" onclick="showCat('B',this)">&#x1F697; B kategorija</button>
    <button class="cat-tab" onclick="showCat('C',this)">&#x1F69B; C kategorija</button>
    <button class="cat-tab" onclick="showCat('D',this)">&#x1F68C; D kategorija</button>
  </div>
  <div class="updated" id="updated"></div>
  <div id="schools-area"><div class="loading">Iel&#x0101;d&#x0113; cenas...</div></div>
  <a href="index.html" class="back-link">&#x2190; Atpaka&#x013C; uz kalkulatoru</a>
</div>

<script>
var pricesData = null;
var currentCat = 'A';

var priceLabels = {
  'teorija': 'Teorija',
  'registracija': 'Re&#x0123;istr&#x0101;cija',
  'dokumenti': 'Dokumenti',
  'brauksana_stunda': 'Brauk&#x0161;ana/st',
  'brauksana_stunda_max': 'Brauk&#x0161;. maks.',
  'min_stundas': 'Min. stundas',
  'laukums_stunda': 'Laukums/st',
  'eksamens': 'Eks&#x0101;mens',
  'teorijas_ieskaite': 'Teor. ieskaite'
};

function showCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderSchools();
}

function renderSchools() {
  var area = document.getElementById('schools-area');
  if (!pricesData || !pricesData.schools) {
    area.innerHTML = '<div class="loading">Iel&#x0101;d&#x0113; cenas...</div>';
    return;
  }
  var schools = pricesData.schools;
  var html = '';
  var count = 0;

  Object.keys(schools).forEach(function(key) {
    var school = schools[key];
    if (!school.categories || !school.categories[currentCat]) return;
    count++;
    var cat = school.categories[currentCat];
    var logoStyle = 'background:' + (school.color || '#1B4D3E') + ';';
    var logoContent = (school.logoUrl && school.logoUrl.length > 0)
      ? '<img src="' + school.logoUrl + '">'
      : (school.initials || school.name.charAt(0));

    html += '<div class="school-card">';
    html += '<div class="school-header">';
    html += '<div class="school-logo" style="' + logoStyle + '">' + logoContent + '</div>';
    html += '<div>';
    html += '<div class="school-name">' + school.name + '</div>';
    if (school.website) {
      html += '<a class="school-link" href="' + school.website + '" target="_blank">' + school.website.replace('https://', '').replace('http://', '') + '</a>';
    }
    html += '</div></div>';

    // Price grid
    html += '<div class="price-grid">';
    var fields = ['registracija', 'dokumenti', 'teorija', 'brauksana_stunda', 'brauksana_stunda_max', 'min_stundas', 'laukums_stunda', 'eksamens', 'teorijas_ieskaite'];
    fields.forEach(function(f) {
      if (cat[f] === undefined) return;
      var label = priceLabels[f] || f;
      var val = cat[f];
      if (val === null) {
        html += '<div class="price-item"><div class="price-label">' + label + '</div><div class="price-value na">N/A</div></div>';
      } else if (f === 'min_stundas') {
        html += '<div class="price-item"><div class="price-label">' + label + '</div><div class="price-value">' + val + '</div></div>';
      } else {
        html += '<div class="price-item"><div class="price-label">' + label + '</div><div class="price-value">&#x20AC;' + val + '</div></div>';
      }
    });
    html += '</div>';

    if (cat.piez) {
      html += '<div class="school-note">' + cat.piez + '</div>';
    }
    html += '</div>';
  });

  if (count === 0) {
    html = '<div class="empty-msg">Pagaid&#x0101;m nav datu par &#x0161;o kategoriju.</div>';
  }
  area.innerHTML = html;
}

// Load from Firebase REST API
function loadPrices() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://autoskolu-kalkulators-default-rtdb.europe-west1.firebasedatabase.app/prices.json', true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          pricesData = JSON.parse(xhr.responseText);
          if (pricesData && pricesData.lastUpdated) {
            document.getElementById('updated').textContent = 'Atjaunots: ' + pricesData.lastUpdated;
          }
          renderSchools();
        } catch(e) {
          document.getElementById('schools-area').innerHTML = '<div class="empty-msg">K&#x013C;&#x016B;da las&#x012B;t datus.</div>';
        }
      } else {
        document.getElementById('schools-area').innerHTML = '<div class="empty-msg">Nevar&#x0113;ja iel&#x0101;d&#x0113;t cenas. P&#x0101;rbaudiet Firebase rules.</div>';
      }
    }
  };
  xhr.send();
}

loadPrices();
</script>
</body>
</html>
