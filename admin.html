<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Autoskolas Kalkulators</title>
<style>
  :root {
    --bg: #F5F0E8; --card: #FFFFFF; --accent: #1B4D3E; --accent-light: #2A7A5E;
    --highlight: #E8A838; --text: #1A1A1A; --text-sec: #5A5A5A;
    --border: #D4CFC5; --danger: #C0392B; --radius: 14px;
    --shadow: 0 2px 16px rgba(27,77,62,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Login */
  .login-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .login-overlay.hidden { display: none; }
  .login-box {
    background: var(--card); border-radius: var(--radius); padding: 40px 32px;
    box-shadow: 0 8px 40px rgba(27,77,62,0.15); max-width: 380px; width: 100%; text-align: center;
  }
  .login-box h2 { font-size: 1.3rem; font-weight: 800; color: var(--accent); margin-bottom: 6px; }
  .login-box p { font-size: 0.85rem; color: var(--text-sec); margin-bottom: 24px; }
  .login-box input {
    display: block; width: 100%; padding: 12px 16px; margin-bottom: 12px;
    border: 2px solid var(--border); border-radius: 10px;
    font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 14px; background: var(--accent); color: white;
    border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .login-box button:hover { background: var(--accent-light); }
  .login-error { color: var(--danger); font-size: 0.82rem; margin-top: 10px; display: none; }

  /* Admin layout */
  .admin-content.hidden { display: none; }
  .topbar {
    background: var(--accent); color: white; padding: 16px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .topbar h1 { font-size: 1.1rem; font-weight: 700; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .topbar-user { font-size: 0.78rem; opacity: 0.7; }
  .topbar button {
    padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
    background: transparent; color: white; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .topbar button:hover { background: rgba(255,255,255,0.1); }

  .admin-container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  .cat-tabs {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .cat-tab {
    padding: 10px 20px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--card); cursor: pointer; font-weight: 700;
    font-size: 0.9rem; color: var(--text-sec); transition: all 0.2s;
  }
  .cat-tab:hover { border-color: var(--accent-light); }
  .cat-tab.active { border-color: var(--accent); background: var(--accent); color: white; }

  .school-editor {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    margin-bottom: 16px; box-shadow: var(--shadow);
    border: 1px solid rgba(0,0,0,0.04);
  }
  .school-editor-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .school-editor-header h3 { font-size: 0.9rem; font-weight: 700; color: var(--accent); }
  .school-rank-badge {
    width: 28px; height: 28px; border-radius: 50%; background: var(--highlight);
    color: var(--accent); display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 800;
  }

  .field-row { margin-bottom: 12px; }
  .field-row label {
    display: block; font-size: 0.75rem; font-weight: 600;
    color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field-row input {
    width: 100%; padding: 10px 14px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 0.88rem; outline: none; transition: border-color 0.2s;
  }
  .field-row input:focus { border-color: var(--accent); }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .logo-preview {
    width: 56px; height: 56px; border-radius: 10px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.7rem; color: white;
    margin-top: 6px; background-size: contain; background-repeat: no-repeat; background-position: center;
  }
  .logo-preview img { width: 100%; height: 100%; object-fit: contain; }

  .save-btn {
    display: block; width: 100%; padding: 16px; margin-top: 24px;
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius); font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(27,77,62,0.2);
  }
  .save-btn:hover { background: var(--accent-light); transform: translateY(-1px); }
  .save-btn.saved { background: #27ae60; }

  .save-status {
    text-align: center; margin-top: 12px; font-size: 0.82rem;
    color: var(--accent); font-weight: 600; display: none;
  }

  .back-link {
    display: block; text-align: center; margin-top: 20px;
    font-size: 0.82rem; color: var(--accent-light); text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- Login overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>Admin Panelis</h2>
    <p>Ielogi ar savu Firebase e-pastu un paroli</p>
    <input type="email" id="login-email" placeholder="E-pasts">
    <input type="password" id="login-password" placeholder="Parole" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Ielogoties</button>
    <div class="login-error" id="login-error">Nepareizs e-pasts vai parole</div>
  </div>
</div>

<!-- Admin content -->
<div class="admin-content hidden" id="admin-content">
  <div class="topbar">
    <h1>Autoskolas Admin</h1>
    <div class="topbar-actions">
      <span class="topbar-user" id="user-email"></span>
      <button onclick="doLogout()">Iziet</button>
    </div>
  </div>

  <div class="admin-container">
    <div class="cat-tabs" id="cat-tabs">
      <div class="cat-tab active" data-cat="A" onclick="switchTab('A')">🏍️ A kategorija</div>
      <div class="cat-tab" data-cat="B" onclick="switchTab('B')">🚗 B kategorija</div>
      <div class="cat-tab" data-cat="C" onclick="switchTab('C')">🚛 C kategorija</div>
      <div class="cat-tab" data-cat="D" onclick="switchTab('D')">🚌 D kategorija</div>
    </div>

    <div id="editors"></div>

    <button class="save-btn" id="save-btn" onclick="saveAll()">Saglabāt izmaiņas</button>
    <div class="save-status" id="save-status">Izmaiņas saglabātas!</div>

    <a href="index.html" class="back-link">← Atpakaļ uz kalkulatoru</a>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// REPLACE WITH YOUR FIREBASE CONFIG
var firebaseConfig = {
  apiKey: "AIzaSyBHj70dt8vxMe2K9MIn6MLCr3cMWP3mrLk",
  authDomain: "autoskolu-kalkulators.firebaseapp.com",
  databaseURL: "https://autoskolu-kalkulators-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "autoskolu-kalkulators"
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.database();

var currentTab = 'A';
var schoolsData = null;

var defaultSchools = {
  A: [
    { name: 'AkategorijaLV', detail: '100% moto specializācija, Rīga', url: 'https://akategorija.com', color: '#C0392B', initials: 'A kat', logoUrl: '' },
    { name: 'DBS Autoskola', detail: 'Drošas Braukšanas Skola, A kat. no €115', url: 'https://dbs.lv', color: '#2C3E50', initials: 'DBS', logoUrl: '' },
    { name: 'Presto', detail: 'Lielākais filiāļu tīkls Latvijā', url: 'https://presto.lv', color: '#1B4D3E', initials: 'P', logoUrl: '' }
  ],
  B: [
    { name: 'Presto', detail: '76% CSDD eksāmena nokārtošana, 50+ filiāles', url: 'https://presto.lv', color: '#1B4D3E', initials: 'P', logoUrl: '' },
    { name: 'Credo Autoprieks', detail: 'Lielākā autoskola Latvijā, teorija no €69', url: 'https://credoautoprieks.lv', color: '#D4A017', initials: 'CA', logoUrl: '' },
    { name: 'DBS Autoskola', detail: 'Drošas Braukšanas Skola, individuāla pieeja', url: 'https://dbs.lv', color: '#2C3E50', initials: 'DBS', logoUrl: '' }
  ],
  C: [
    { name: 'Credo Autoprieks', detail: 'C kat. teorija no €69, filiāles visā Latvijā', url: 'https://credoautoprieks.lv', color: '#D4A017', initials: 'CA', logoUrl: '' },
    { name: 'BUTS', detail: 'C + 95.kods vienā kursā, Aizkraukle', url: 'https://buts.lv', color: '#E74C3C', initials: 'BUTS', logoUrl: '' },
    { name: 'Presto', detail: 'C, C1, CE kategorijas, tālmācība pieejama', url: 'https://presto.lv', color: '#1B4D3E', initials: 'P', logoUrl: '' }
  ],
  D: [
    { name: 'Credo Autoprieks', detail: 'D kat. apmācība, Rīga, Jelgava, Liepāja', url: 'https://credoautoprieks.lv', color: '#D4A017', initials: 'CA', logoUrl: '' },
    { name: 'BUTS', detail: 'D + 95.kods apmācība, reģionālās filiāles', url: 'https://buts.lv', color: '#E74C3C', initials: 'BUTS', logoUrl: '' },
    { name: 'Presto', detail: 'D, D1, DE kategorijas visā Latvijā', url: 'https://presto.lv', color: '#1B4D3E', initials: 'P', logoUrl: '' }
  ]
};

// Login
function doLogin() {
  var email = document.getElementById('login-email').value;
  var password = document.getElementById('login-password').value;
  var errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  auth.signInWithEmailAndPassword(email, password).catch(function(error) {
    errEl.textContent = 'Nepareizs e-pasts vai parole';
    errEl.style.display = 'block';
  });
}

function doLogout() {
  auth.signOut();
}

// Auth state
auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('login-overlay').classList.add('hidden');
    document.getElementById('admin-content').classList.remove('hidden');
    document.getElementById('user-email').textContent = user.email;
    loadData();
  } else {
    document.getElementById('login-overlay').classList.remove('hidden');
    document.getElementById('admin-content').classList.add('hidden');
  }
});

function loadData() {
  db.ref('schools').once('value').then(function(snapshot) {
    schoolsData = snapshot.val();
    if (!schoolsData) {
      // Initialize with defaults
      schoolsData = JSON.parse(JSON.stringify(defaultSchools));
      db.ref('schools').set(schoolsData);
    }
    renderEditors();
  });
}

function switchTab(cat) {
  currentTab = cat;
  document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.cat-tab[data-cat="' + cat + '"]').classList.add('active');
  collectCurrentData();
  renderEditors();
}

function renderEditors() {
  var container = document.getElementById('editors');
  var list = schoolsData[currentTab] || [];
  var html = '';

  for (var i = 0; i < list.length; i++) {
    var s = list[i];
    var logoPreview = s.logoUrl
      ? '<img src="' + s.logoUrl + '" alt="logo">'
      : s.initials;

    html += '<div class="school-editor" data-index="' + i + '">' +
      '<div class="school-editor-header">' +
        '<h3>' + s.name + '</h3>' +
        '<div class="school-rank-badge">' + (i + 1) + '</div>' +
      '</div>' +
      '<div class="field-grid">' +
        '<div class="field-row">' +
          '<label>Nosaukums</label>' +
          '<input type="text" data-field="name" value="' + escHtml(s.name) + '">' +
        '</div>' +
        '<div class="field-row">' +
          '<label>Mājas lapas URL</label>' +
          '<input type="text" data-field="url" value="' + escHtml(s.url) + '">' +
        '</div>' +
      '</div>' +
      '<div class="field-row">' +
        '<label>Apraksts</label>' +
        '<input type="text" data-field="detail" value="' + escHtml(s.detail) + '">' +
      '</div>' +
      '<div class="field-grid">' +
        '<div class="field-row">' +
          '<label>Logo URL (attēla adrese)</label>' +
          '<input type="text" data-field="logoUrl" value="' + escHtml(s.logoUrl || '') + '" oninput="updateLogoPreview(this, ' + i + ')">' +
          '<div class="logo-preview" id="logo-preview-' + i + '" style="background:' + s.color + '">' + logoPreview + '</div>' +
        '</div>' +
        '<div class="field-row">' +
          '<label>Fona krāsa (hex)</label>' +
          '<input type="text" data-field="color" value="' + escHtml(s.color) + '">' +
          '<div class="field-row" style="margin-top:8px">' +
            '<label>Iniciāļi (ja nav logo)</label>' +
            '<input type="text" data-field="initials" value="' + escHtml(s.initials) + '">' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  container.innerHTML = html;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&').replace(/"/g,'"').replace(/</g,'<').replace(/>/g,'>');
}

function updateLogoPreview(input, idx) {
  var preview = document.getElementById('logo-preview-' + idx);
  var url = input.value.trim();
  if (url) {
    preview.innerHTML = '<img src="' + url + '" alt="logo">';
  } else {
    var initials = schoolsData[currentTab][idx].initials || '?';
    preview.innerHTML = initials;
  }
}

function collectCurrentData() {
  var editors = document.querySelectorAll('.school-editor');
  editors.forEach(function(editor) {
    var idx = parseInt(editor.getAttribute('data-index'));
    var inputs = editor.querySelectorAll('input');
    inputs.forEach(function(input) {
      var field = input.getAttribute('data-field');
      if (field && schoolsData[currentTab][idx]) {
        schoolsData[currentTab][idx][field] = input.value;
      }
    });
  });
}

function saveAll() {
  collectCurrentData();
  var btn = document.getElementById('save-btn');
  var status = document.getElementById('save-status');

  db.ref('schools').set(schoolsData).then(function() {
    btn.textContent = 'Saglabāts!';
    btn.classList.add('saved');
    status.style.display = 'block';
    setTimeout(function() {
      btn.textContent = 'Saglabāt izmaiņas';
      btn.classList.remove('saved');
      status.style.display = 'none';
    }, 3000);
  }).catch(function(err) {
    btn.textContent = 'Kļūda! Mēģini vēlreiz';
    setTimeout(function() { btn.textContent = 'Saglabāt izmaiņas'; }, 3000);
  });
}
</script>
</body>
</html>
