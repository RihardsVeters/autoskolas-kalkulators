<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panelis</title>
<style>
  :root {
    --bg: #F5F0E8;
    --card: #FFFFFF;
    --accent: #1B4D3E;
    --accent-light: #2A7A5E;
    --highlight: #E8A838;
    --highlight-light: #FFF3DC;
    --text: #1A1A1A;
    --text-secondary: #5A5A5A;
    --border: #D4CFC5;
    --danger: #C0392B;
    --shadow: 0 2px 16px rgba(27,77,62,0.08);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 60px;
  }
  .login-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--accent); z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  }
  .login-overlay.hidden { display: none; }
  .login-box {
    background: white; border-radius: 20px; padding: 40px;
    max-width: 380px; width: 90%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-box h2 { color: var(--accent); margin-bottom: 6px; font-size: 1.3rem; }
  .login-box p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 20px; }
  .login-box input {
    width: 100%; padding: 12px 14px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 0.9rem; margin-bottom: 10px; outline: none;
    font-family: inherit;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 12px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; margin-top: 4px; font-family: inherit;
  }
  .login-box button:hover { background: var(--accent-light); }
  .login-error { color: var(--danger); font-size: 0.8rem; margin-top: 8px; min-height: 20px; }
  .admin-header {
    background: var(--accent); color: white; padding: 20px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .admin-header h1 { font-size: 1.3rem; font-weight: 800; }
  .logout-btn {
    background: rgba(255,255,255,0.15); color: white; border: none;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600;
    font-size: 0.85rem; font-family: inherit;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.25); }
  .admin-container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
  .tab-bar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    padding: 10px 20px; border: 2px solid var(--border); background: var(--card);
    border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
    transition: all 0.2s; font-family: inherit;
  }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab-btn:hover:not(.active) { border-color: var(--accent-light); }
  .tab-btn.sub-tab { background: var(--highlight-light); border-color: var(--highlight); color: var(--accent); }
  .tab-btn.sub-tab.active { background: var(--highlight); color: var(--accent); border-color: var(--highlight); }
  .editor-card {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .editor-card h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .field-group { margin-bottom: 10px; }
  .field-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field-group input {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 0.88rem; outline: none; font-family: inherit;
  }
  .field-group input:focus { border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .logo-preview {
    width: 48px; height: 48px; border-radius: 10px; overflow: hidden;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.6rem; color: white; margin-top: 6px;
  }
  .logo-preview img { width: 100%; height: 100%; object-fit: contain; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .save-btn {
    flex: 1; padding: 14px; background: var(--accent); color: white;
    border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .save-btn:hover { background: var(--accent-light); }
  .add-btn {
    padding: 10px 16px; background: var(--highlight); color: var(--accent);
    border: none; border-radius: 10px; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .add-btn:hover { opacity: 0.9; }
  .remove-btn {
    background: none; border: 1px solid var(--danger); color: var(--danger);
    padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .remove-btn:hover { background: var(--danger); color: white; }
  .save-msg { text-align: center; color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-top: 10px; min-height: 24px; }
  .back-link {
    display: block; text-align: center; margin-top: 20px;
    color: var(--accent-light); text-decoration: none; font-size: 0.85rem;
  }
  .sub-list { list-style: none; }
  .sub-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #F0EDE7; font-size: 0.88rem;
  }
  .sub-item:last-child { border-bottom: none; }
  .sub-email-text { font-weight: 600; color: var(--text); }
  .sub-date { font-size: 0.75rem; color: var(--text-secondary); }
  .sub-count {
    display: inline-block; background: var(--highlight); color: var(--accent);
    font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 6px; margin-left: 8px;
  }
  .sub-empty { color: var(--text-secondary); font-size: 0.85rem; font-style: italic; padding: 16px 0; }
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>Admin Panelis</h2>
    <p>Ielogi ar savu Firebase e-pastu un paroli</p>
    <input type="email" id="login-email" placeholder="E-pasts" autocomplete="email">
    <input type="password" id="login-pass" placeholder="Parole" autocomplete="current-password">
    <button onclick="doLogin()">Ielogoties</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="admin-header">
  <h1>Autoskolas Admin</h1>
  <button class="logout-btn" onclick="doLogout()">Iziet</button>
</div>

<div class="admin-container">
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('A', this)">\ud83c\udfcd\ufe0f A kategorija</button>
    <button class="tab-btn" onclick="switchTab('B', this)">\ud83d\ude97 B kategorija</button>
    <button class="tab-btn" onclick="switchTab('C', this)">\ud83d\ude9b C kategorija</button>
    <button class="tab-btn" onclick="switchTab('D', this)">\ud83d\ude8c D kategorija</button>
    <button class="tab-btn sub-tab" onclick="switchTab('subscribers', this)">\ud83d\udce7 Subscribers</button>
  </div>

  <div id="editor-area"></div>

  <div class="btn-row" id="btn-row">
    <button class="save-btn" id="save-btn" onclick="saveAll()">Saglab\u0101t izmai\u0146as</button>
    <button class="add-btn" id="add-btn" onclick="addSchool()">+ Pievienot skolu</button>
  </div>
  <div class="save-msg" id="save-msg"></div>

  <a href="index.html" class="back-link">\u2190 Atpaka\u013c uz kalkulatoru</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"><\/script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"><\/script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyBHj70dt8vxMe2K9MIn6MLCr3cMWP3mrLk",
  authDomain: "autoskolu-kalkulators.firebaseapp.com",
  databaseURL: "https://autoskolu-kalkulators-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "autoskolu-kalkulators"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var auth = firebase.auth();

var defaultSchools = {
  A: [
    { name: 'AkategorijaLV', detail: '100% moto specializ\u0101cija, R\u012bga', url: 'https://akategorija.com', color: '#C0392B', initials: 'A kat', logoUrl: '' },
    { name: 'DBS Autoskola', detail: 'Dro\u0161as Brauk\u0161anas Skola, A kat. no \u20ac115', url: 'https://dbs.lv', color: '#2C3E50', initials: 'DBS', logoUrl: '' },
    { name: 'Ein\u0161teins', detail: 'Liel\u0101k\u0101 autoskola Latvij\u0101, 30000+ audz\u0113k\u0146u', url: 'https://einsteins.lv', color: '#E67E22', initials: 'E', logoUrl: '' }
  ],
  B: [
    { name: 'Ein\u0161teins', detail: 'Piepras\u012bt\u0101k\u0101 autoskola Latvij\u0101', url: 'https://einsteins.lv', color: '#E67E22', initials: 'E', logoUrl: '' },
    { name: 'Presto', detail: '76% CSDD nok\u0101rto\u0161ana, 50+ fili\u0101les', url: 'https://presto.lv', color: '#1B4D3E', initials: 'P', logoUrl: '' },
    { name: 'Credo Autoprieks', detail: '15+ gadu pieredze, 19 fili\u0101les', url: 'https://credoautoprieks.lv', color: '#D4A017', initials: 'CA', logoUrl: '' }
  ],
  C: [
    { name: 'Ein\u0161teins', detail: 'C, CE kategorijas, online un kl\u0101tien\u0113', url: 'https://einsteins.lv', color: '#E67E22', initials: 'E', logoUrl: '' },
    { name: 'BUTS', detail: 'C + 95.kods vien\u0101 kurs\u0101', url: 'https://buts.lv', color: '#E74C3C', initials: 'BUTS', logoUrl: '' },
    { name: 'Fort\u016bna', detail: '14 fili\u0101les, C, CE, C1 kat.', url: 'https://www.fortuna.lv', color: '#8E44AD', initials: 'F', logoUrl: '' }
  ],
  D: [
    { name: 'Credo Autoprieks', detail: 'D kat. no \u20ac69, vair\u0101kas pils\u0113tas', url: 'https://credoautoprieks.lv', color: '#D4A017', initials: 'CA', logoUrl: '' },
    { name: 'Fort\u016bna', detail: 'D, D1, DE kat., 14 fili\u0101les', url: 'https://www.fortuna.lv', color: '#8E44AD', initials: 'F', logoUrl: '' },
    { name: 'Presto', detail: 'D, D1, DE kategorijas vis\u0101 Latvij\u0101', url: 'https://presto.lv', color: '#1B4D3E', initials: 'P', logoUrl: '' }
  ]
};

var schoolsData = JSON.parse(JSON.stringify(defaultSchools));
var currentTab = 'A';
var subscribersList = [];

auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('login-overlay').classList.add('hidden');
    loadData();
  } else {
    document.getElementById('login-overlay').classList.remove('hidden');
  }
});

function doLogin() {
  var email = document.getElementById('login-email').value;
  var pass = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-error');
  errEl.textContent = '';
  auth.signInWithEmailAndPassword(email, pass).catch(function(err) {
    errEl.textContent = 'Nepareizs e-pasts vai parole';
  });
}

function doLogout() { auth.signOut(); }

function loadData() {
  db.ref('schools').on('value', function(snapshot) {
    var fbData = snapshot.val();
    if (fbData) {
      ['A', 'B', 'C', 'D'].forEach(function(cat) {
        if (fbData[cat]) { schoolsData[cat] = fbData[cat]; }
      });
    } else {
      schoolsData = JSON.parse(JSON.stringify(defaultSchools));
      db.ref('schools').set(schoolsData);
    }
    if (currentTab !== 'subscribers') renderEditor();
  });

  db.ref('subscribers').on('value', function(snapshot) {
    subscribersList = [];
    var fbSubs = snapshot.val();
    if (fbSubs) {
      Object.keys(fbSubs).forEach(function(key) {
        subscribersList.push(fbSubs[key]);
      });
      subscribersList.sort(function(a, b) {
        return new Date(b.timestamp) - new Date(a.timestamp);
      });
    }
    if (currentTab === 'subscribers') renderSubscribers();
  });
}

function switchTab(tab, btn) {
  // IMPORTANT: save current tab inputs BEFORE switching
  if (currentTab !== 'subscribers') {
    collectCurrentTabData();
  }
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (tab === 'subscribers') {
    document.getElementById('btn-row').style.display = 'none';
    renderSubscribers();
  } else {
    document.getElementById('btn-row').style.display = '';
    renderEditor();
  }
  document.getElementById('save-msg').textContent = '';
}

function renderEditor() {
  if (currentTab === 'subscribers') return;
  var area = document.getElementById('editor-area');
  var list = schoolsData[currentTab] || [];
  var html = '';
  list.forEach(function(s, i) {
    var previewBg = 'background:' + (s.color || '#1B4D3E') + ';';
    var previewContent = (s.logoUrl && s.logoUrl.length > 0)
      ? '<img src="' + s.logoUrl + '" style="width:100%;height:100%;object-fit:contain;">'
      : (s.initials || s.name.charAt(0));
    html += '<div class="editor-card">' +
      '<h3><span>#' + (i + 1) + ' ' + s.name + '</span><button class="remove-btn" onclick="removeSchool(' + i + ')">Dz\u0113st</button></h3>' +
      '<div class="field-group"><label>Nosaukums</label><input data-idx="' + i + '" data-field="name" value="' + (s.name || '').replace(/"/g, '&quot;') + '"></div>' +
      '<div class="field-group"><label>Apraksts</label><input data-idx="' + i + '" data-field="detail" value="' + (s.detail || '').replace(/"/g, '&quot;') + '"></div>' +
      '<div class="field-group"><label>URL</label><input data-idx="' + i + '" data-field="url" value="' + (s.url || '').replace(/"/g, '&quot;') + '"></div>' +
      '<div class="field-group"><label>Logo URL (tuk\u0161s = r\u0101da inici\u0101\u013cus)</label><input data-idx="' + i + '" data-field="logoUrl" value="' + (s.logoUrl || '').replace(/"/g, '&quot;') + '" oninput="updateLogoPreview(' + i + ', this.value)"></div>' +
      '<div class="field-row">' +
        '<div class="field-group"><label>Kr\u0101sa</label><input type="color" data-idx="' + i + '" data-field="color" value="' + (s.color || '#1B4D3E') + '"></div>' +
        '<div class="field-group"><label>Inici\u0101\u013ci</label><input data-idx="' + i + '" data-field="initials" value="' + (s.initials || '').replace(/"/g, '&quot;') + '"></div>' +
      '</div>' +
      '<div class="field-group"><label>Priek\u0161skat\u012bjums</label><div class="logo-preview" id="preview-' + i + '" style="' + previewBg + '">' + previewContent + '</div></div>' +
    '</div>';
  });
  if (list.length === 0) {
    html = '<div class="editor-card"><p style="color:var(--text-secondary);font-style:italic;">Nav autoskolu \u0161ai kategorijai. Nospied \u201c+ Pievienot skolu\u201d.</p></div>';
  }
  area.innerHTML = html;
}

function renderSubscribers() {
  var area = document.getElementById('editor-area');
  var html = '<div class="editor-card">' +
    '<h3><span>\ud83d\udce7 Subscriber saraksts <span class="sub-count">' + subscribersList.length + '</span></span></h3>';
  if (subscribersList.length === 0) {
    html += '<div class="sub-empty">Pagaid\u0101m nav neviena subscriber.</div>';
  } else {
    html += '<ul class="sub-list">';
    subscribersList.forEach(function(sub) {
      var dateStr = sub.timestamp ? new Date(sub.timestamp).toLocaleString('lv-LV') : '\u2014';
      html += '<li class="sub-item">' +
        '<span class="sub-email-text">' + sub.email + '</span>' +
        '<span class="sub-date">' + dateStr + '</span>' +
      '</li>';
    });
    html += '</ul>';
  }
  html += '</div>';
  area.innerHTML = html;
}

function updateLogoPreview(idx, url) {
  var preview = document.getElementById('preview-' + idx);
  if (!preview) return;
  if (url && url.trim()) {
    preview.innerHTML = '<img src="' + url.trim() + '" style="width:100%;height:100%;object-fit:contain;">';
  } else {
    var initialsInput = document.querySelector('input[data-idx="' + idx + '"][data-field="initials"]');
    preview.innerHTML = initialsInput ? initialsInput.value : '';
  }
}

function collectCurrentTabData() {
  if (currentTab === 'subscribers') return;
  var inputs = document.querySelectorAll('input[data-idx][data-field]');
  inputs.forEach(function(input) {
    var idx = parseInt(input.getAttribute('data-idx'));
    var field = input.getAttribute('data-field');
    if (schoolsData[currentTab] && schoolsData[currentTab][idx]) {
      schoolsData[currentTab][idx][field] = input.value;
    }
  });
}

function addSchool() {
  if (currentTab === 'subscribers') return;
  collectCurrentTabData();
  if (!schoolsData[currentTab]) schoolsData[currentTab] = [];
  schoolsData[currentTab].push({
    name: 'Jauna autoskola',
    detail: 'Apraksts',
    url: 'https://',
    color: '#1B4D3E',
    initials: '?',
    logoUrl: ''
  });
  renderEditor();
  window.scrollTo(0, document.body.scrollHeight);
}

function removeSchool(idx) {
  if (currentTab === 'subscribers') return;
  collectCurrentTabData();
  if (schoolsData[currentTab] && schoolsData[currentTab][idx] !== undefined) {
    var name = schoolsData[currentTab][idx].name;
    if (confirm('Vai tie\u0161\u0101m dz\u0113st "' + name + '"?')) {
      schoolsData[currentTab].splice(idx, 1);
      renderEditor();
    }
  }
}

function saveAll() {
  collectCurrentTabData();
  db.ref('schools').set(schoolsData).then(function() {
    document.getElementById('save-msg').textContent = 'Izmai\u0146as saglab\u0101tas!';
    setTimeout(function() { document.getElementById('save-msg').textContent = ''; }, 3000);
  }).catch(function(err) {
    document.getElementById('save-msg').textContent = 'K\u013c\u016bda: ' + err.message;
  });
}

document.getElementById('login-pass').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});
<\/script>
</body>
</html>
