<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panelis</title>
<style>
  :root {
    --bg: #F5F0E8;
    --card: #FFFFFF;
    --accent: #1B4D3E;
    --accent-light: #2A7A5E;
    --highlight: #E8A838;
    --highlight-light: #FFF3DC;
    --text: #1A1A1A;
    --text-secondary: #5A5A5A;
    --border: #D4CFC5;
    --danger: #C0392B;
    --shadow: 0 2px 16px rgba(27,77,62,0.08);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: 60px;
  }
  .login-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--accent); z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  }
  .login-overlay.hidden { display: none; }
  .login-box {
    background: white; border-radius: 20px; padding: 40px;
    max-width: 380px; width: 90%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-box h2 { color: var(--accent); margin-bottom: 6px; font-size: 1.3rem; }
  .login-box p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 20px; }
  .login-box input {
    width: 100%; padding: 12px 14px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 0.9rem; margin-bottom: 10px; outline: none;
    font-family: inherit;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 12px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; margin-top: 4px; font-family: inherit;
  }
  .login-box button:hover { background: var(--accent-light); }
  .login-error { color: var(--danger); font-size: 0.8rem; margin-top: 8px; min-height: 20px; }
  .admin-header {
    background: var(--accent); color: white; padding: 20px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .admin-header h1 { font-size: 1.3rem; font-weight: 800; }
  .logout-btn {
    background: rgba(255,255,255,0.15); color: white; border: none;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600;
    font-size: 0.85rem; font-family: inherit;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.25); }
  .admin-container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
  .tab-bar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    padding: 10px 20px; border: 2px solid var(--border); background: var(--card);
    border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
    transition: all 0.2s; font-family: inherit;
  }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab-btn:hover:not(.active) { border-color: var(--accent-light); }
  .tab-btn.sub-tab { background: var(--highlight-light); border-color: var(--highlight); color: var(--accent); }
  .tab-btn.sub-tab.active { background: var(--highlight); color: var(--accent); border-color: var(--highlight); }
  .editor-card {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .editor-card h3 { font-size: 0.95rem; color: var(--accent); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .field-group { margin-bottom: 10px; }
  .field-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field-group input, .field-group textarea {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 0.88rem; outline: none; font-family: inherit;
  }
  .field-group textarea { height: 50px; resize: vertical; }
  .field-group input:focus, .field-group textarea:focus { border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .logo-preview {
    width: 48px; height: 48px; border-radius: 10px; overflow: hidden;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.6rem; color: white; margin-top: 6px;
  }
  .logo-preview img { width: 100%; height: 100%; object-fit: contain; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .save-btn {
    flex: 1; padding: 14px; background: var(--accent); color: white;
    border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .save-btn:hover { background: var(--accent-light); }
  .add-btn {
    padding: 10px 16px; background: var(--highlight); color: var(--accent);
    border: none; border-radius: 10px; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .add-btn:hover { opacity: 0.9; }
  .remove-btn {
    background: none; border: 1px solid var(--danger); color: var(--danger);
    padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .remove-btn:hover { background: var(--danger); color: white; }
  .save-msg { text-align: center; color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-top: 10px; min-height: 24px; }
  .back-link {
    display: block; text-align: center; margin-top: 20px;
    color: var(--accent-light); text-decoration: none; font-size: 0.85rem;
  }
  .sub-list { list-style: none; }
  .sub-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #F0EDE7; font-size: 0.88rem;
  }
  .sub-item:last-child { border-bottom: none; }
  .sub-email-text { font-weight: 600; color: var(--text); }
  .sub-date { font-size: 0.75rem; color: var(--text-secondary); }
  .sub-count {
    display: inline-block; background: var(--highlight); color: var(--accent);
    font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 6px; margin-left: 8px;
  }
  .sub-empty { color: var(--text-secondary); font-size: 0.85rem; font-style: italic; padding: 16px 0; }
  .price-cat-tabs { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .price-cat-tab {
    padding: 6px 14px; border: 1.5px solid var(--border); background: #F8F6F1;
    border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.78rem;
    font-family: inherit; transition: all 0.2s;
  }
  .price-cat-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .price-cat-tab:hover:not(.active) { border-color: var(--accent-light); }
  .price-school-card {
    background: #FAFAF7; border-radius: 10px; padding: 14px; margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .price-school-card h4 { font-size: 0.88rem; color: var(--accent); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .profile-card {
    background: #FAFAF7; border-radius: 10px; padding: 14px; margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .profile-card h4 { font-size: 0.88rem; color: var(--accent); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .profile-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .csdd-section-admin { margin-top: 10px; padding: 10px; background: #F0F7F4; border-radius: 8px; border: 1px solid #D0E6DA; }
  .csdd-section-admin h5 { font-size: 0.75rem; color: var(--accent); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .csdd-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; }
  .csdd-row-label { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); grid-column: 1 / -1; margin-top: 4px; }
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>Admin Panelis</h2>
    <p>Ielogi ar savu Firebase e-pastu un paroli</p>
    <input type="email" id="login-email" placeholder="E-pasts" autocomplete="email">
    <input type="password" id="login-pass" placeholder="Parole" autocomplete="current-password">
    <button onclick="doLogin()">Ielogoties</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="admin-header">
  <h1>Autoskolas Admin</h1>
  <button class="logout-btn" onclick="doLogout()">Iziet</button>
</div>

<div class="admin-container">
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('profiles', this)">&#x1F3EB; Profili</button>
    <button class="tab-btn" onclick="switchTab('prices', this)">&#x1F4B0; Cenas</button>
    <button class="tab-btn sub-tab" onclick="switchTab('subscribers', this)">&#x1F4E7; Subscribers</button>
  </div>

  <div id="editor-area"></div>

  <div class="btn-row" id="btn-row">
    <button class="save-btn" id="save-btn" onclick="saveAll()">Saglab&#x0101;t izmai&#x0146;as</button>
    <button class="add-btn" id="add-btn" onclick="addSchool()">+ Pievienot skolu</button>
  </div>
  <div class="save-msg" id="save-msg"></div>

  <a href="index.html" class="back-link">&#x2190; Atpaka&#x013c; uz kalkulatoru</a>
</div>

<!-- SCRIPT BLOCK 1: UI functions -->
<script>
var currentTab = 'profiles';
var subscribersList = [];
var pricesData = null;
var priceCat = 'A';

function doLogin() {
  var email = document.getElementById('login-email').value;
  var pass = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (typeof firebase === 'undefined' || !firebase.auth) {
    errEl.textContent = 'Firebase nav pieejams. Parbaudiet interneta savienojumu.';
    return;
  }
  firebase.auth().signInWithEmailAndPassword(email, pass).catch(function(err) {
    errEl.textContent = 'Nepareizs e-pasts vai parole';
  });
}

function doLogout() {
  if (typeof firebase !== 'undefined' && firebase.auth) {
    firebase.auth().signOut();
  }
}

function switchTab(tab, btn) {
  // Collect data from current tab before switching
  if (currentTab === 'profiles') collectProfileData();
  if (currentTab === 'prices') collectPriceData();
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (tab === 'subscribers') {
    document.getElementById('btn-row').style.display = 'none';
    renderSubscribers();
  } else if (tab === 'prices') {
    document.getElementById('btn-row').style.display = '';
    document.getElementById('add-btn').style.display = 'none';
    renderPricesEditor();
  } else if (tab === 'profiles') {
    document.getElementById('btn-row').style.display = '';
    document.getElementById('add-btn').style.display = '';
    document.getElementById('add-btn').textContent = '+ Pievienot skolu';
    renderProfiles();
  }
  document.getElementById('save-msg').textContent = '';
}

// ======== PROFILES TAB ========

function renderProfiles() {
  var area = document.getElementById('editor-area');
  if (!pricesData || !pricesData.schools) {
    area.innerHTML = '<div class="editor-card"><div class="sub-empty">Nav datu. Palaidiet seed skriptu vai pievienojiet skolu manu\u0101li.</div></div>';
    return;
  }
  var schools = pricesData.schools;
  var keys = Object.keys(schools);
  var html = '';

  keys.forEach(function(schoolKey) {
    var s = schools[schoolKey];
    var previewBg = 'background:' + (s.color || '#1B4D3E') + ';';
    var previewContent = (s.logoUrl && s.logoUrl.length > 0)
      ? '<img src="' + s.logoUrl + '">'
      : (s.initials || (s.name ? s.name.charAt(0) : '?'));

    // Count categories
    var cats = s.categories ? Object.keys(s.categories) : [];
    var catList = cats.length > 0 ? cats.join(', ') : 'nav';

    html += '<div class="profile-card">';
    html += '<h4>';
    html += '<span>';
    html += '<div class="logo-preview" style="' + previewBg + ';display:inline-flex;vertical-align:middle;margin-right:8px;">' + previewContent + '</div>';
    html += (s.name || schoolKey);
    html += ' <span style="font-size:0.7rem;color:var(--text-secondary);font-weight:400;">(Kategorijas: ' + catList + ')</span>';
    html += '</span>';
    html += '<button class="remove-btn" onclick="removeSchool(\'' + schoolKey.replace(/'/g, "\\'") + '\')">Dz\u0113st skolu</button>';
    html += '</h4>';

    // Profile fields
    html += '<div class="field-row">';
    html += '<div class="field-group"><label>Nosaukums</label><input data-profile="' + schoolKey + '" data-pfield="name" value="' + (s.name || '').replace(/"/g, '&quot;') + '"></div>';
    html += '<div class="field-group"><label>M\u0101jaslapa</label><input data-profile="' + schoolKey + '" data-pfield="website" value="' + (s.website || '').replace(/"/g, '&quot;') + '"></div>';
    html += '</div>';

    html += '<div class="field-group"><label>Logo URL (tuk\u0161s = r\u0101da inici\u0101\u013cus)</label><input data-profile="' + schoolKey + '" data-pfield="logoUrl" value="' + (s.logoUrl || '').replace(/"/g, '&quot;') + '" oninput="updateProfilePreview(\'' + schoolKey.replace(/'/g, "\\'") + '\', this.value)"></div>';

    html += '<div class="field-row">';
    html += '<div class="field-group"><label>Kr\u0101sa</label><input type="color" data-profile="' + schoolKey + '" data-pfield="color" value="' + (s.color || '#1B4D3E') + '"></div>';
    html += '<div class="field-group"><label>Inici\u0101\u013ci (ja nav logo)</label><input data-profile="' + schoolKey + '" data-pfield="initials" value="' + (s.initials || '').replace(/"/g, '&quot;') + '"></div>';
    html += '</div>';

    // CSDD statistics editing
    html += '<div class="csdd-section-admin">';
    html += '<h5>&#x1F4CA; CSDD statistika</h5>';

    var csddGroups = [
      { key: 'teorija', label: 'Teorija' },
      { key: 'brauksana_A', label: 'Brauk\u0161ana A' },
      { key: 'brauksana_B', label: 'Brauk\u0161ana B' },
      { key: 'brauksana_parejie', label: 'Brauk\u0161. p\u0101r\u0113jie (C/D)' }
    ];

    csddGroups.forEach(function(g) {
      var csddVal = (s.csdd && s.csdd[g.key]) ? s.csdd[g.key] : { kartoja: 0, nokartoja: 0, procents: 0 };
      html += '<div class="csdd-row-label">' + g.label + '</div>';
      html += '<div class="csdd-row">';
      html += '<div class="field-group"><label>K\u0101rtoja</label><input type="number" data-profile="' + schoolKey + '" data-csdd-group="' + g.key + '" data-csdd-field="kartoja" value="' + (csddVal.kartoja || 0) + '"></div>';
      html += '<div class="field-group"><label>Nok\u0101rtoja</label><input type="number" data-profile="' + schoolKey + '" data-csdd-group="' + g.key + '" data-csdd-field="nokartoja" value="' + (csddVal.nokartoja || 0) + '"></div>';
      html += '<div class="field-group"><label>Procents (%)</label><input type="number" step="0.01" data-profile="' + schoolKey + '" data-csdd-group="' + g.key + '" data-csdd-field="procents" value="' + (csddVal.procents || 0) + '"></div>';
      html += '</div>';
    });

    html += '</div>';
    html += '</div>';
  });

  if (keys.length === 0) {
    html = '<div class="editor-card"><div class="sub-empty">Nav autoskolu. Nospied \u201c+ Pievienot skolu\u201d.</div></div>';
  }

  area.innerHTML = html;
}

function updateProfilePreview(schoolKey, url) {
  // Preview is inline in the card header, re-render is simplest
}

function collectProfileData() {
  if (!pricesData || !pricesData.schools) return;

  // Collect profile fields
  var inputs = document.querySelectorAll('input[data-profile][data-pfield]');
  inputs.forEach(function(inp) {
    var sk = inp.getAttribute('data-profile');
    var field = inp.getAttribute('data-pfield');
    if (pricesData.schools[sk]) {
      pricesData.schools[sk][field] = inp.value;
    }
  });

  // Collect CSDD fields
  var csddInputs = document.querySelectorAll('input[data-profile][data-csdd-group][data-csdd-field]');
  csddInputs.forEach(function(inp) {
    var sk = inp.getAttribute('data-profile');
    var group = inp.getAttribute('data-csdd-group');
    var field = inp.getAttribute('data-csdd-field');
    if (pricesData.schools[sk]) {
      if (!pricesData.schools[sk].csdd) pricesData.schools[sk].csdd = {};
      if (!pricesData.schools[sk].csdd[group]) pricesData.schools[sk].csdd[group] = { kartoja: 0, nokartoja: 0, procents: 0 };
      pricesData.schools[sk].csdd[group][field] = parseFloat(inp.value) || 0;
    }
  });
}

function addSchool() {
  if (currentTab === 'profiles') {
    collectProfileData();
    if (!pricesData) pricesData = { schools: {}, lastUpdated: '' };
    if (!pricesData.schools) pricesData.schools = {};
    var newKey = 'JaunaSkola_' + Date.now();
    pricesData.schools[newKey] = {
      name: 'Jauna autoskola',
      website: 'https://',
      color: '#1B4D3E',
      initials: '?',
      logoUrl: '',
      csdd: {
        teorija: { kartoja: 0, nokartoja: 0, procents: 0 },
        brauksana_A: { kartoja: 0, nokartoja: 0, procents: 0 },
        brauksana_B: { kartoja: 0, nokartoja: 0, procents: 0 },
        brauksana_parejie: { kartoja: 0, nokartoja: 0, procents: 0 }
      },
      categories: {}
    };
    renderProfiles();
    window.scrollTo(0, document.body.scrollHeight);
  }
}

function removeSchool(schoolKey) {
  if (!pricesData || !pricesData.schools || !pricesData.schools[schoolKey]) return;
  var name = pricesData.schools[schoolKey].name || schoolKey;
  if (confirm('Vai tie\u0161\u0101m dz\u0113st "' + name + '" un visas t\u0101s cenas?')) {
    collectProfileData();
    delete pricesData.schools[schoolKey];
    renderProfiles();
  }
}

// ======== SUBSCRIBERS TAB ========

function renderSubscribers() {
  var area = document.getElementById('editor-area');
  var html = '<div class="editor-card">' +
    '<h3><span>Subscriber saraksts <span class="sub-count">' + subscribersList.length + '</span></span></h3>';
  if (subscribersList.length === 0) {
    html += '<div class="sub-empty">Pagaid\u0101m nav neviena subscriber.</div>';
  } else {
    html += '<ul class="sub-list">';
    subscribersList.forEach(function(sub) {
      var dateStr = sub.timestamp ? new Date(sub.timestamp).toLocaleString('lv-LV') : '\u2014';
      html += '<li class="sub-item">' +
        '<span class="sub-email-text">' + sub.email + '</span>' +
        '<span class="sub-date">' + dateStr + '</span>' +
      '</li>';
    });
    html += '</ul>';
  }
  html += '</div>';
  area.innerHTML = html;
}

// ======== PRICES TAB ========

var priceFields = [
  { key: 'registracija', label: 'Re\u0123istr\u0101cija (\u20ac)' },
  { key: 'dokumenti', label: 'Dokumenti (\u20ac)' },
  { key: 'teorija', label: 'Teorija (\u20ac)' },
  { key: 'brauksana_stunda', label: 'Brauk\u0161ana/st (\u20ac)' },
  { key: 'brauksana_stunda_max', label: 'Brauk\u0161. maks. (\u20ac)' },
  { key: 'min_stundas', label: 'Min. stundas' },
  { key: 'laukums_stunda', label: 'Laukums/st (\u20ac)' },
  { key: 'eksamens', label: 'Eks\u0101mens (\u20ac)' },
  { key: 'teorijas_ieskaite', label: 'Teor. ieskaite (\u20ac)' }
];

function switchPriceCat(cat, btn) {
  collectPriceData();
  priceCat = cat;
  document.querySelectorAll('.price-cat-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderPriceSchools();
}

function renderPricesEditor() {
  var area = document.getElementById('editor-area');
  var html = '<div class="editor-card">';
  html += '<h3>Autoskolu cenas pa kategorij\u0101m</h3>';
  html += '<div class="price-cat-tabs">';
  var cats = ['A', 'B', 'C', 'D'];
  cats.forEach(function(c) {
    var active = c === priceCat ? ' active' : '';
    html += '<button class="price-cat-tab' + active + '" onclick="switchPriceCat(\'' + c + '\', this)">' + c + ' kategorija</button>';
  });
  html += '</div>';
  html += '<div id="price-schools-area"></div>';
  html += '</div>';

  // Add category button
  html += '<div class="btn-row">';
  html += '<button class="save-btn" onclick="saveAll()">Saglab\u0101t cenas</button>';
  html += '<button class="add-btn" onclick="addPriceSchoolCat()">+ Pievienot skolu \u0161ai kategorij.</button>';
  html += '</div>';

  area.innerHTML = html;
  renderPriceSchools();
}

function renderPriceSchools() {
  var container = document.getElementById('price-schools-area');
  if (!container) return;
  if (!pricesData || !pricesData.schools) {
    container.innerHTML = '<div class="sub-empty">Nav cenu datu. Palaidiet seed skriptu vai pievienojiet manu\u0101li.</div>';
    return;
  }
  var schools = pricesData.schools;
  var keys = Object.keys(schools);
  var html = '';
  var count = 0;

  keys.forEach(function(schoolKey) {
    var school = schools[schoolKey];
    if (!school.categories || !school.categories[priceCat]) return;
    count++;
    var cat = school.categories[priceCat];
    html += '<div class="price-school-card">';
    html += '<h4><span>' + (school.name || schoolKey) + '</span><button class="remove-btn" onclick="removePriceSchoolCat(\'' + schoolKey.replace(/'/g, "\\'") + '\')">No\u0146emt no ' + priceCat + '</button></h4>';

    // Price fields only (profile is in Profili tab)
    html += '<div class="field-row-3">';
    priceFields.forEach(function(f) {
      var val = cat[f.key];
      var displayVal = (val === null || val === undefined) ? '' : val;
      html += '<div class="field-group"><label>' + f.label + '</label><input type="number" step="0.01" data-price-school="' + schoolKey + '" data-price-field="' + f.key + '" value="' + displayVal + '" placeholder="tuk\u0161s = N/A"></div>';
    });
    html += '</div>';

    // Note
    html += '<div class="field-group"><label>Piez\u012bme</label><textarea data-price-school="' + schoolKey + '" data-price-field="piez">' + (cat.piez || '') + '</textarea></div>';
    html += '</div>';
  });

  if (count === 0) {
    html = '<div class="sub-empty">Nav skolu ar ' + priceCat + ' kategoriju. Nospiediet "+ Pievienot skolu \u0161ai kategorij.".</div>';
  }
  container.innerHTML = html;
}

function collectPriceData() {
  if (!pricesData || !pricesData.schools) return;
  // Collect price fields
  var priceInputs = document.querySelectorAll('input[data-price-school][data-price-field]');
  priceInputs.forEach(function(inp) {
    var sk = inp.getAttribute('data-price-school');
    var field = inp.getAttribute('data-price-field');
    if (pricesData.schools[sk] && pricesData.schools[sk].categories && pricesData.schools[sk].categories[priceCat]) {
      var val = inp.value.trim();
      if (val === '') {
        pricesData.schools[sk].categories[priceCat][field] = null;
      } else {
        pricesData.schools[sk].categories[priceCat][field] = parseFloat(val);
      }
    }
  });
  // Collect textareas (piez)
  var textareas = document.querySelectorAll('textarea[data-price-school][data-price-field]');
  textareas.forEach(function(ta) {
    var sk = ta.getAttribute('data-price-school');
    var field = ta.getAttribute('data-price-field');
    if (pricesData.schools[sk] && pricesData.schools[sk].categories && pricesData.schools[sk].categories[priceCat]) {
      pricesData.schools[sk].categories[priceCat][field] = ta.value;
    }
  });
}

function addPriceSchoolCat() {
  collectPriceData();
  if (!pricesData || !pricesData.schools) {
    alert('Vispirms pievienojiet skolu Profili sada\u013c\u0101.');
    return;
  }
  // Show list of schools that DON'T have this category yet
  var schools = pricesData.schools;
  var available = [];
  Object.keys(schools).forEach(function(key) {
    var s = schools[key];
    if (!s.categories) s.categories = {};
    if (!s.categories[priceCat]) {
      available.push({ key: key, name: s.name || key });
    }
  });

  if (available.length === 0) {
    alert('Visas skolas jau ir pievienotas ' + priceCat + ' kategorijai.');
    return;
  }

  var msg = 'Izv\u0113lieties skolu, ko pievienot ' + priceCat + ' kategorijai:\n\n';
  available.forEach(function(a, i) {
    msg += (i + 1) + '. ' + a.name + '\n';
  });
  msg += '\nIevadiet numuru:';

  var choice = prompt(msg);
  if (!choice) return;
  var idx = parseInt(choice) - 1;
  if (idx < 0 || idx >= available.length) {
    alert('Nepareizs numurs.');
    return;
  }

  var chosenKey = available[idx].key;
  pricesData.schools[chosenKey].categories[priceCat] = {
    teorija: null,
    brauksana_stunda: null,
    min_stundas: null,
    piez: ''
  };
  renderPriceSchools();
}

function removePriceSchoolCat(schoolKey) {
  if (!pricesData || !pricesData.schools || !pricesData.schools[schoolKey]) return;
  var name = pricesData.schools[schoolKey].name || schoolKey;
  if (confirm('No\u0146emt "' + name + '" no ' + priceCat + ' kategorijas?')) {
    collectPriceData();
    delete pricesData.schools[schoolKey].categories[priceCat];
    renderPriceSchools();
  }
}

// ======== SAVE ========

function saveAll() {
  if (currentTab === 'profiles') collectProfileData();
  if (currentTab === 'prices') collectPriceData();

  if (typeof firebase === 'undefined') {
    document.getElementById('save-msg').textContent = 'Firebase nav pieejams.';
    return;
  }

  var now = new Date();
  var dateStr = now.toLocaleDateString('lv-LV', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
  pricesData.lastUpdated = dateStr;

  firebase.database().ref('prices').set(pricesData).then(function() {
    document.getElementById('save-msg').textContent = 'Izmai\u0146as saglab\u0101tas!';
    setTimeout(function() { document.getElementById('save-msg').textContent = ''; }, 3000);
  }).catch(function(err) {
    document.getElementById('save-msg').textContent = 'K\u013c\u016bda: ' + err.message;
  });
}

document.getElementById('login-pass').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});

renderProfiles();
